<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="flashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bgGrad)"/>
  <!-- Viewfinder / camera body -->
  <rect x="28" y="44" width="72" height="50" rx="10" fill="white" opacity="0.95"/>
  <!-- Top bump (flash housing) -->
  <rect x="48" y="34" width="32" height="14" rx="6" fill="white" opacity="0.95"/>
  <!-- Lens outer -->
  <circle cx="64" cy="68" r="18" fill="#4F46E5" opacity="0.9"/>
  <!-- Lens inner -->
  <circle cx="64" cy="68" r="12" fill="#1E1B4B"/>
  <!-- Lens reflection -->
  <circle cx="58" cy="62" r="4" fill="white" opacity="0.4"/>
  <!-- Lightning bolt / snap -->
  <path d="M96 22 L88 42 L96 40 L86 58" fill="none" stroke="url(#flashGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small viewfinder corners -->
  <path d="M22 38 L22 26 L34 26" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <path d="M106 38 L106 26 L94 26" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <path d="M22 98 L22 110 L34 110" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <path d="M106 98 L106 110 L94 110" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
</svg>
