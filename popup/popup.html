<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>ScreenSnap</title>
  <link rel="stylesheet" href="../assets/styles/themes.css">
  <link rel="stylesheet" href="popup.css">
  <script src="../assets/scripts/theme-init.js"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="../assets/icons/icon-32.png" alt="ScreenSnap" class="logo">
      <h1>ScreenSnap</h1>
    </header>

    <!-- Recording indicator (shown when recording is active) -->
    <div id="recording-indicator" class="recording-indicator" style="display:none;">
      <span class="rec-dot-pulse"></span>
      <span>Recording in progress…</span>
    </div>

    <!-- Last capture quick access -->
    <div id="last-capture" class="last-capture" style="display:none;">
      <img id="last-capture-thumb" class="last-capture-thumb" alt="Last capture">
      <div class="last-capture-info">
        <span id="last-capture-name" class="last-capture-name">-</span>
        <button id="btn-open-last" class="btn-link-small">Open last →</button>
      </div>
    </div>

    <section class="section">
      <h2>📸 Screenshot</h2>
      <div class="button-group">
        <button id="btn-visible" class="btn btn-primary" title="Alt+Shift+V">
          <span class="btn-icon">🖥️</span>
          <span class="btn-text">Visible Area</span>
          <span class="btn-shortcut">Alt+Shift+V</span>
        </button>
        <button id="btn-full" class="btn btn-primary" title="Alt+Shift+F">
          <span class="btn-icon">📄</span>
          <span class="btn-text">Full Page</span>
          <span class="btn-shortcut">Alt+Shift+F</span>
        </button>
        <button id="btn-selection" class="btn btn-primary" title="Alt+Shift+S">
          <span class="btn-icon">✂️</span>
          <span class="btn-text">Selection</span>
          <span class="btn-shortcut">Alt+Shift+S</span>
        </button>
      </div>
    </section>

    <section class="section">
      <h2>🎥 Record</h2>
      <div class="button-group">
        <button id="btn-record-tab" class="btn btn-record">
          <span class="btn-icon">📑</span>
          <span class="btn-text">Current Tab</span>
        </button>
        <button id="btn-record-screen" class="btn btn-record">
          <span class="btn-icon">🖥️</span>
          <span class="btn-text">Full Screen</span>
        </button>
        <button id="btn-record-cam" class="btn btn-record">
          <span class="btn-icon">📷</span>
          <span class="btn-text">Camera</span>
        </button>
      </div>
    </section>

    <footer class="footer">
      <button id="btn-history" class="btn-link">📁 History</button>
      <span class="footer-version">v0.4.0</span>
      <button id="btn-settings" class="btn-link">⚙️ Settings</button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
