<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScreenSnap — Editor</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body>
  <div class="editor-container">
    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-left">
        <span class="toolbar-brand">📸 ScreenSnap</span>
      </div>

      <div class="toolbar-center">
        <!-- Annotation tools — Sprint 2 -->
        <div class="tool-group" id="annotation-tools" style="display: none;">
          <button class="tool-btn" data-tool="arrow" title="Arrow">➡️</button>
          <button class="tool-btn" data-tool="rect" title="Rectangle">▭</button>
          <button class="tool-btn" data-tool="circle" title="Circle">◯</button>
          <button class="tool-btn" data-tool="text" title="Text">T</button>
          <button class="tool-btn" data-tool="blur" title="Blur">🔲</button>
          <button class="tool-btn" data-tool="highlight" title="Highlight">🖍️</button>
        </div>
      </div>

      <div class="toolbar-right">
        <button id="btn-copy" class="action-btn" title="Copy to clipboard">
          📋 Copy
        </button>
        <button id="btn-save-png" class="action-btn" title="Save as PNG">
          💾 PNG
        </button>
        <button id="btn-save-jpg" class="action-btn" title="Save as JPG">
          💾 JPG
        </button>
        <button id="btn-download" class="action-btn action-primary" title="Download">
          ⬇️ Download
        </button>
      </div>
    </div>

    <!-- Canvas Area -->
    <div class="canvas-wrapper" id="canvas-wrapper">
      <canvas id="editor-canvas"></canvas>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <span id="status-dimensions">-</span>
      <span id="status-size">-</span>
    </div>
  </div>

  <script src="editor.js"></script>
</body>
</html>
